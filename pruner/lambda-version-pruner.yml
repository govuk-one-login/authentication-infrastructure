AWSTemplateFormatVersion: "2010-09-09"
Description: Lambda version pruner - standalone template

Parameters:
  Environment:
    Description: "The name of the environment to deploy to"
    Type: String
    AllowedValues:
      - build
      - staging
      - production
      - integration
      - dev

  ScheduleCron:
    Type: String
    Description: Cron expression for scheduling
    Default: "cron(0 10 ? * MON-FRI *)"

  VersionsToKeep:
    Type: String
    Description: Number of Lambda versions to keep
    Default: "5"

  EnableAlarmActions:
    Type: String
    Description: Whether to enable alarm actions
    AllowedValues:
      - "Yes"
      - "No"
    Default: "Yes"

Conditions:
  UseAlarmActions:
    Fn::Equals:
      - !Ref EnableAlarmActions
      - "Yes"

  IsSlackNotifyEnabled: !Equals
    - !FindInMap [
        EnvironmentConfiguration,
        !Ref Environment,
        IsSlackNotifyEnabled,
      ]
    - "Yes"

Mappings:
  EnvironmentConfiguration:
    dev:
      IsSlackNotifyEnabled: "Yes"
    build:
      IsSlackNotifyEnabled: "Yes"
    staging:
      IsSlackNotifyEnabled: "Yes"
    integration:
      IsSlackNotifyEnabled: "Yes"
    production:
      IsSlackNotifyEnabled: "Yes"

Resources:
  SlackAlertNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${Environment}-lambda-pruner-notifications"
      Subscription: !If
        - IsSlackNotifyEnabled
        - - Protocol: lambda
            Endpoint: !Sub arn:aws:lambda:eu-west-2:${AWS::AccountId}:function:${Environment}-alerts
        - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-lambda-pruner-notifications"
        - Key: Service
          Value: "Authentication"
        - Key: Source
          Value: "govuk-one-login/authentication-infrastructure/pruner/lambda-version-pruner.yaml"


  SlackLambdaPrunerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub arn:aws:lambda:eu-west-2:${AWS::AccountId}:function:${Environment}-alerts
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref SlackAlertNotificationTopic
      Id: AllowExecutionFromSlackAlertsSNSTopic

  LambdaPrunerPermissionsBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${Environment}-lambda-pruner-permissions-boundary"
      Description: "Permissions boundary for Lambda pruner roles"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - lambda:ListFunctions
            Resource: "*"
          - Effect: Allow
            Action:
              - lambda:ListVersionsByFunction
              - lambda:DeleteFunction
            Resource:
              - !Sub "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
          - Effect: Allow
            Action:
              - ssm:StartAutomationExecution
            Resource:
              - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:document/*"
              - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:automation-execution/*"
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/*"

  SSMAutomationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-lambda-pruner-ssm-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaPrunerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:ListFunctions
                  - lambda:ListVersionsByFunction
                  - lambda:DeleteFunction
                Resource: "*"
      PermissionsBoundary: !Ref LambdaPrunerPermissionsBoundary

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-lambda-pruner-scheduler-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartAutomationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ssm:StartAutomationExecution
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/${PrunerAutomationDocument}"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:automation-execution/*"
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt SSMAutomationRole.Arn
      PermissionsBoundary: !Ref LambdaPrunerPermissionsBoundary

  PrunerAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: "0.3"
        description: Prune old Lambda versions
        assumeRole: !GetAtt SSMAutomationRole.Arn
        parameters:
          VersionsToKeep:
            type: String
            default: "5"
          Environment:
            type: String
            default: !Ref Environment
        mainSteps:
          - name: PruneVersions
            action: aws:executeScript
            timeoutSeconds: 3600  # increasing up to 3600 (max for executeScript)
            inputs:
              Runtime: python3.11
              Handler: handler
              InputPayload:
                VersionsToKeep: "{{ VersionsToKeep }}"
              Script: |
                import boto3

                def handler(event, context):
                    keep = int(event["VersionsToKeep"])
                    if keep < 3:
                        raise ValueError("Minimum versions to keep is 3")

                    client = boto3.client("lambda")
                    paginator = client.get_paginator("list_functions")
                    functions = [f["FunctionName"] for f in paginator.paginate().build_full_result()["Functions"]]

                    deleted_count = 0
                    for fn in functions:
                        try:
                            versions = sorted([
                                int(v["Version"])
                                for v in client.get_paginator("list_versions_by_function")
                                              .paginate(FunctionName=fn)
                                              .build_full_result()["Versions"]
                                if v["Version"] != "$LATEST"
                            ])
                            if len(versions) > keep:
                                prune = versions[:-keep]
                                for v in prune:
                                    print(f"Deleting {fn} version {v}")
                                    client.delete_function(FunctionName=fn, Qualifier=str(v))
                                    deleted_count += 1
                        except Exception as e:
                            print(f"Error processing {fn}: {e}")

                    return {"deleted_count": deleted_count}

  DailySchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      FlexibleTimeWindow:
        Mode: "OFF"
      Name: !Sub "${Environment}-lambda-version-pruner-daily"
      ScheduleExpression: !Ref ScheduleCron
      Target:
        Arn: "arn:aws:scheduler:::aws-sdk:ssm:startAutomationExecution"
        Input: !Sub |
          {
            "DocumentName": "${PrunerAutomationDocument}",
            "Parameters": {
              "VersionsToKeep": ["${VersionsToKeep}"],
              "Environment": ["${Environment}"]
            }
          }
        RoleArn: !GetAtt SchedulerRole.Arn

  AutomationFailureEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Environment}-lambda-pruner-automation-failure"
      Description: "Trigger alert when Lambda version pruner SSM Automation fails or times out"
      EventPattern:
        source:
          - aws.ssm
        detail-type:
          - EC2 Automation Execution Status-change Notification
        detail:
          Status:
            - Failed
            - TimedOut
          Definition:
            - !Ref PrunerAutomationDocument
      State: ENABLED
      Targets:
        - Id: SlackNotification
          Arn: !Ref SlackAlertNotificationTopic

  AutomationFailureEventTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SlackAlertNotificationTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SlackAlertNotificationTopic
